---
# Portainer git-stack 部署用：從 repo build image（config+策略已烤進去），不用 bind。
services:
  crypto-pulse:
    build: .
    image: crypto-pulse:latest
    container_name: crypto-pulse
    restart: unless-stopped
    # log / db / 交易日誌 用 named volume 持久化（config/策略在 image 內）
    volumes:
      - cp_logs:/freqtrade/user_data/logs
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/logs/tradesv3.sqlite
      --config /freqtrade/user_data/config_bitget_btc15m.json
      --strategy MeanRevertMakerMTF

volumes:
  cp_logs:
